services:
  # ======================== BACKEND SERVICE ========================
  backend-service-1:
    build:
      context: .
      dockerfile: backend-service/Dockerfile
    container_name: backend-service-1
    environment:
      - SPRING_APPLICATION_NAME=backend-service-1
      - SERVER_PORT=8088
    networks:
      - tienda-network
    healthcheck:
      test: ["CMD-SHELL", "exec 6<>/dev/tcp/localhost/8088 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  backend-service-2:
    build:
      context: .
      dockerfile: backend-service/Dockerfile
    container_name: backend-service-2
    environment:
      - SPRING_APPLICATION_NAME=backend-service-2
      - SERVER_PORT=8088
    networks:
      - tienda-network
    healthcheck:
      test: ["CMD-SHELL", "exec 6<>/dev/tcp/localhost/8088 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  backend-lb-1:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: backend-lb-1
    volumes:
      - ./nginx/backend-lb-1.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:9088"
      - "8401:8401"
    depends_on:
      - backend-service-1
      - backend-service-2
    networks:
      - tienda-network
    restart: unless-stopped

  backend-lb-2:
    build:
      context: .
      dockerfile: nginx/Dockerfile
